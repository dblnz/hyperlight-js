version: 2
updates: 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
    labels:
      - "kind/dependencies"
  - package-ecosystem: "cargo"
    directories: 
      - "/"
    schedule:
      interval: "daily"
      time: "03:00"
    labels:
      - "kind/dependencies"
  - package-ecosystem: "npm"
    directories: 
      - "/src/js-host-api"
      - "/src/js-host-api/examples/mcp-server"
    schedule:
      interval: "daily"
      time: "03:00"
    labels:
      - "kind/dependencies"